<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JB Connect Ltd. - HRMS</title>
    <base href="./" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css" />
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/report.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Web_JbcHrms.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        window.openFileDialog = function(inputId) {
            var input = document.getElementById(inputId);
            if (!input) {
                console.warn('openFileDialog: element with id "' + inputId + '" was not found.');
                return;
            }
            input.click();
        }
        window.readFile = function(inputId, dotNetReference) {
            var input = document.getElementById(inputId);
            if (!input) {
                console.warn('readFile: element with id "' + inputId + '" was not found.');
                return;
            }
            if (!input.files || input.files.length === 0) {
                console.warn('readFile: no files were selected for input id "' + inputId + '".');
                return;
            }
            if (!dotNetReference) {
                console.warn('readFile: missing dotNetReference for input id "' + inputId + '".');
                return;
            }
            var file = input.files[0];
            var reader = new FileReader();
            reader.onload = function(e) {
                dotNetReference.invokeMethodAsync('ReceiveFileContent', e.target.result, file.name)
                    .catch(function(error) {
                        console.error('readFile: failed to pass file content to .NET', error);
                    });
            };
            reader.onerror = function(error) {
                console.error('readFile: unable to read file', error);
            };
            reader.readAsText(file);
        }
        window.initDataTable = function(tableId) {
            var tableSelector = tableId ? '#' + tableId : '#employeeTable';
            
            if ($.fn.DataTable.isDataTable(tableSelector)) {
                $(tableSelector).DataTable().destroy();
            }
            
            var config = {
                responsive: true,
                scrollX: false,
                autoWidth: false,
                scrollCollapse: true
            };
            
			if (tableId === 'accountLetterTable') {

				config.order = [[3, 'desc']];
				config.columnDefs = [
					{ orderable: false, targets: 0 },
					{ responsivePriority: 1, targets: 1 },
					{ responsivePriority: 2, targets: 3 },
					{ responsivePriority: 3, targets: 2 }
				];
            } else if (tableId === 'employeeDirectoryTable') {
                config.columnDefs = [
                    { responsivePriority: 1, targets: 0 },
                    { responsivePriority: 2, targets: 1 }
                ];
			} else if (tableId === 'assetTable') {
				config.columnDefs = [
					{ responsivePriority: 1, targets: 0 },
					{ responsivePriority: 2, targets: -1 },
					{ orderable: false, targets: -1 }
				];
			} else {

				config.columnDefs = [
					{ responsivePriority: 1, targets: 0 },
					{ responsivePriority: 2, targets: 2 },
				];
			}
            
            $(tableSelector).DataTable(config);
        }
        window.downloadUpdatedCsv = function(csvContent, fileName) {
            var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            var url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', 'updated_' + fileName);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        window.printReport = function(elementId, title) {
            var sourceElement = document.getElementById(elementId);
            if (!sourceElement) {
                console.warn('printReport: element with id "' + elementId + '" was not found.');
                return;
            }

            var clone = sourceElement.cloneNode(true);
            clone.style.removeProperty('display');
            clone.classList.remove('d-none', 'visually-hidden');

            var printWindow = window.open('', '_blank', 'width=1024,height=768');
            if (!printWindow) {
				console.warn('printReport: unable to open print window.');
				return;
			}

            var documentTitle = title || 'Report';
			var html = [
				'<!DOCTYPE html>',
				'<html>',
				'<head>',
				'    <title>' + documentTitle + '</title>',
				'    <meta charset="utf-8" />',
				'    <meta name="viewport" content="width=device-width, initial-scale=1.0" />',
				'    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />',
				'    <link rel="stylesheet" href="css/report.css" />',
				'<\/head>',
				'<body>',
				clone.outerHTML,
				'<\/body>',
				'<\/html>'
			].join('\n');

            printWindow.document.open();
            printWindow.document.write(html);
            printWindow.document.close();

			printWindow.onload = function() {
				printWindow.focus();
				printWindow.print();
				setTimeout(function() { printWindow.close(); }, 200);
			};
        }
        window.showModal = function(modalId) {
            var modal = new bootstrap.Modal(document.getElementById(modalId));
            modal.show();
        }
        window.hideModal = function(modalId) {
            var modalElement = document.getElementById(modalId);
            var modal = bootstrap.Modal.getInstance(modalElement);
            if (modal) {
                modal.hide();
            }
        }
    </script>
    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { initializeAppCheck, ReCaptchaEnterpriseProvider, getToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app-check.js";

        let appCheckInstance = null;

        window.initFirebaseAppCheck = function(config, recaptchaKey) {
            if (getApps().length === 0) {
                const app = initializeApp(config);
                appCheckInstance = initializeAppCheck(app, {
                    provider: new ReCaptchaEnterpriseProvider(recaptchaKey),
                    isTokenAutoRefreshEnabled: true
                });
            }
        };

        window.getRecaptchaToken = async function() {
            if (!appCheckInstance) {
                console.error("Firebase App Check is not initialized. Make sure to call initFirebaseAppCheck first.");
                return null;
            }
            try {
                const appCheckTokenResponse = await getToken(appCheckInstance, false);
                return appCheckTokenResponse.token; 
            } catch (error) {
                console.error("Error getting App Check token:", error);
                return null;
            }
        };
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
